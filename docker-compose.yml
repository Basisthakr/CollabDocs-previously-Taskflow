################################################################################
# docker-compose.yml
#
# Three services:
#   postgres  — PostgreSQL 16 database with a named volume for persistence.
#   backend   — Spring Boot API, waits for postgres to be healthy.
#   frontend  — React app served by nginx, built with the correct API URLs.
#
# Quick start:
#   1. cp .env.example .env
#   2. Fill in the required values in .env
#   3. docker compose up --build
#
# The frontend is served at http://localhost:3000
# The backend API is at       http://localhost:8080
################################################################################

services:

  # ----------------------------------------------------------------------------
  # PostgreSQL
  # ----------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       collabdocs
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # healthcheck lets backend use `condition: service_healthy` so it does
    # not start before the DB is actually accepting connections.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d collabdocs"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ----------------------------------------------------------------------------
  # Spring Boot backend
  # ----------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Database
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/collabdocs
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}

      # Hibernate — use 'validate' once schema is stable
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${DDL_AUTO:-update}

      # JWT
      APPLICATION_SECURITY_JWT_SECRET_KEY:                    ${JWT_SECRET:?Set JWT_SECRET in .env}
      APPLICATION_SECURITY_JWT_EXPIRATION:                    ${JWT_EXPIRATION:-86400000}
      APPLICATION_SECURITY_JWT_REFRESH_TOKEN_EXPIRATION:      ${JWT_REFRESH_EXPIRATION:-604800000}

      # CORS — allow the frontend origin
      APP_CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}

      # Email / 2-FA (leave blank to disable OTP emails in dev)
      SPRING_MAIL_HOST:     ${MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT:     ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy

  # ----------------------------------------------------------------------------
  # React / Vite frontend (nginx)
  # ----------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      # Vite bakes these into the JS bundle at BUILD TIME.
      # The browser makes requests to these URLs directly, so they must be
      # reachable from the end-user's machine — use localhost for local dev.
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
        VITE_WS_URL:  ${VITE_WS_URL:-ws://localhost:8080/docs/ws}
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
