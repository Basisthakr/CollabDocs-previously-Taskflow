server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Backend REST API proxy ──────────────────────────────────────────────
    # Requests to /api/* and /auth/* are forwarded to the backend container.
    # The browser never needs to know the backend's address.

    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── WebSocket proxy ─────────────────────────────────────────────────────
    # STOMP over WebSocket — must upgrade the HTTP connection.
    location /docs/ws {
        proxy_pass             http://backend:8080;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
    }

    # ── React Router SPA fallback ───────────────────────────────────────────
    # Route all other requests to index.html so React Router handles them
    # client-side. Without this, refreshing /edit/123 returns 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively; Vite fingerprints filenames.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
